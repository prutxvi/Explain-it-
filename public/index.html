<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ExplainIt AI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>🧠 ExplainIt AI</h1>
    <p class="subtitle">Enter any topic — get a simple explanation instantly.</p>

    <div class="input-row">
      <input
        type="text"
        id="topicInput"
        placeholder="e.g. Photosynthesis, Binary Search, React..."
      />
      <button id="explainBtn">Explain It ✨</button>
    </div>

    <div class="result-card" id="resultCard">
      <p id="resultText">Your explanation will appear here...</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
